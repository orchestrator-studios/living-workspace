<!DOCTYPE html>
<!--
  index.template.html — the dashboard's index page. Part of the standard kit.

  The user's front door: one card per view (/view/<name>) and one per published
  query (/api/<name>). Nothing is listed by hand — the server enumerates the
  templates in views/ and the registry in tools/repo.py on every ask, so a new
  view or query appears here the moment it is grown.

  Binding works like any view (see "Template binding" in tools/server.py): the
  server stamps the two placeholders in the script below at serve time — the
  index payload {workspace, views, queries}, and the live flag. When live, the
  page re-asks /api/_index every 2 seconds and repaints on change.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Workspace</title>
<style>
  :root {
    --surface: #fcfcfb; --card: #ffffff; --border: #e4e3de;
    --ink: #1c1c1a; --ink-2: #5f5e57; --track: #f0efec; --accent: #2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19; --card: #232322; --border: #383835;
      --ink: #ffffff; --ink-2: #c3c2b7; --track: #2c2c2a; --accent: #3987e5;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; background: var(--surface);
         color: var(--ink); padding: 28px 22px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.25rem; margin-bottom: 2px; }
  .sub { color: var(--ink-2); font-size: 0.84rem; margin-bottom: 22px; }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
              background: #2e9e5b; margin-right: 4px; }
  h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em;
       color: var(--ink-2); margin: 18px 4px 8px; }
  .item { display: block; background: var(--card); border: 1px solid var(--border);
          border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
          color: var(--ink); text-decoration: none; }
  .item:hover { border-color: var(--accent); }
  .item .name { font-weight: 600; font-size: 0.9rem; }
  .item .kind { float: right; font-family: ui-monospace, Consolas, monospace;
                font-size: 0.7rem; color: var(--ink-2); }
  .empty { background: var(--track); border-radius: 10px; padding: 18px;
           color: var(--ink-2); font-size: 0.88rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title">Living Workspace</h1>
  <p class="sub"><span class="live-dot"></span>live — views appear here as the workspace
    grows them</p>
  <div id="content"></div>
</div>
<script>
// Both constants below are placeholders stamped in by the server at serve time
// (see "Template binding" in tools/server.py).
const LIVE = __LIVE__;              // true when served live; false in a static instance
const initialPayload = __DATA__;    // {workspace, views, queries} at serve time

// Escape a value for safe interpolation into HTML.
function esc(value) {
  return String(value).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch]));
}

// Repaint the index from one payload: a card per view, a card per published
// query, or the empty-workspace note when neither exists yet.
function render(payload) {
  document.getElementById("title").textContent = payload.workspace;
  document.title = payload.workspace;
  let html = "";
  if (payload.views.length) {
    html += "<h2>Views</h2>" + payload.views.map(view =>
      `<a class="item" href="/view/${esc(view)}"><span class="kind">live</span>` +
      `<span class="name">${esc(view)}</span></a>`).join("");
  }
  if (payload.queries.length) {
    html += "<h2>Queries</h2>" + payload.queries.map(query =>
      `<a class="item" href="/api/${esc(query)}"><span class="kind">/api/${esc(query)}</span>` +
      `<span class="name">${esc(query)}</span></a>`).join("");
  }
  if (!html) {
    html = '<div class="empty">Nothing to show yet — this workspace hasn\'t grown a view. ' +
           'Start working; the first view will appear here the moment it exists.</div>';
  }
  document.getElementById("content").innerHTML = html;
}

render(initialPayload);

// Liveness: re-ask /api/_index every 2 seconds and repaint only when the payload
// actually changed (compared in serialized form, so an unchanged payload costs
// nothing). Polling on purpose: the server enumerates views and queries fresh on
// every ask, so freshness is structural.
if (LIVE) {
  let lastRendered = JSON.stringify(initialPayload);
  setInterval(async () => {
    try {
      const response = await fetch("/api/_index", {cache: "no-store"});
      if (!response.ok) return;
      const freshPayload = await response.json();
      const serialized = JSON.stringify(freshPayload);
      if (serialized === lastRendered) return;
      lastRendered = serialized;
      render(freshPayload);
    } catch (err) { /* server briefly away — keep the last good render */ }
  }, 2000);
}
</script>
</body>
</html>
