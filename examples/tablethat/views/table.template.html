<!DOCTYPE html>
<!--
  table.template.html — the table viewer (grown).

  Renders ANY table from its definition: headers from the table record's columns array,
  one row per row record, values typed (dates formatted, booleans as marks, selects as
  chips, urls as links, unknowns as an honest dash). This one template is the viewer for
  every table the workspace will ever hold — the workspace analogue of the app's React
  table component. Parameterized: /view/table?table_id=T-001.

  What lives where, per the workspace's rules:
    - Sorting, filtering, search, and the "n of m" readout are PRESENTATION over the one
      answer the server already delivered (repo.table(table_id)). They reorder and hide
      delivered rows; they never re-derive a number about the record. They live here.
    - The bottom line is a stored field on the table record, refreshed by the agent
      (capabilities/bottom-line.md). The view renders it; it never computes one.
    - Nothing here writes. Edits go through conversation and tools/add_row.py.
  Control state (sort, filters, search) is ephemeral JS state, held outside render() so
  the 2-second poll repaints without disturbing it.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table</title>
<style>
  :root {
    --surface: #fcfcfb; --card: #ffffff; --border: #e4e3de; --head: #f6f5f2;
    --ink: #1c1c1a; --ink-2: #5f5e57; --ink-3: #8b8a80; --track: #f0efec;
    --accent: #2a78d6; --zebra: #fafaf8; --hover: #f2f6fb; --gap: #b0741f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19; --card: #232322; --border: #383835; --head: #2a2a28;
      --ink: #ffffff; --ink-2: #c3c2b7; --ink-3: #8b8a80; --track: #2c2c2a;
      --accent: #3987e5; --zebra: #262625; --hover: #2b3440; --gap: #d9a94e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; background: var(--surface);
         color: var(--ink); padding: 24px 20px; }
  .wrap { max-width: 1180px; margin: 0 auto; }
  h1 { font-size: 1.25rem; margin-bottom: 2px; }
  .sub { color: var(--ink-2); font-size: 0.84rem; margin-bottom: 14px; }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
              background: #2e9e5b; margin-right: 4px; }
  a.back { color: var(--accent); text-decoration: none; font-size: 0.84rem; }
  .bottom { margin: 0 0 14px; padding: 10px 12px; background: var(--track);
            border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0;
            font-size: 0.88rem; }

  /* toolbar — lives outside the repainted region so focus survives the poll */
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
             margin-bottom: 10px; }
  .toolbar input[type=search] {
    flex: 1; min-width: 180px; padding: 6px 10px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--card); color: var(--ink);
    font: inherit; font-size: 0.86rem; }
  .toolbar input[type=search]:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .btn { padding: 6px 11px; border-radius: 7px; border: 1px solid var(--border);
         background: var(--card); color: var(--ink); font: inherit;
         font-size: 0.82rem; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .btn[hidden] { display: none; }
  .readout { color: var(--ink-2); font-size: 0.8rem; font-variant-numeric: tabular-nums; }

  /* filter chips — one group per select/boolean column */
  .filters { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
  .fgroup { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .flabel { color: var(--ink-3); font-size: 0.72rem; text-transform: uppercase;
            letter-spacing: 0.05em; margin-right: 2px; }
  .chip-btn { border: 1px solid var(--border); background: var(--card); color: var(--ink-2);
              border-radius: 999px; padding: 2px 10px; font: inherit; font-size: 0.76rem;
              cursor: pointer; }
  .chip-btn:hover { border-color: var(--accent); }
  .chip-btn[aria-pressed="true"] { background: var(--accent); border-color: var(--accent);
                                   color: #fff; }
  .chip-btn .n { opacity: 0.65; margin-left: 4px; font-variant-numeric: tabular-nums; }

  .scroller { overflow: auto; max-height: 70vh; background: var(--card);
              border: 1px solid var(--border); border-radius: 8px; }
  table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 0.86rem; }
  thead th { position: sticky; top: 0; z-index: 2; text-align: left; padding: 7px 12px;
             background: var(--head); border-bottom: 2px solid var(--border);
             white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: var(--accent); }
  thead th .type { display: block; font-weight: 400; font-family: ui-monospace, Consolas,
                   monospace; font-size: 0.66rem; color: var(--ink-3); }
  thead th .arrow { color: var(--accent); margin-left: 3px; }
  thead th .fill { color: var(--gap); }
  tbody td { padding: 6px 12px; border-bottom: 1px solid var(--border);
             vertical-align: top; }
  tbody tr:nth-child(even) { background: var(--zebra); }
  tbody tr:hover { background: var(--hover); }
  tbody tr:last-child td { border-bottom: none; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.unknown { color: var(--ink-3); }
  td.unknown.required { color: var(--gap); font-weight: 600; }
  td.sourced { cursor: help; }
  td a { color: var(--accent); }
  .chip { display: inline-block; background: var(--track); border-radius: 999px;
          padding: 0 8px; font-size: 0.78rem; }
  .clip { display: inline-block; max-width: 34ch; overflow: hidden;
          text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }
  td.open .clip { max-width: none; white-space: normal; }
  .rowmeta { color: var(--ink-3); font-size: 0.72rem; margin-top: 8px; }
  .rowmeta code { font-family: ui-monospace, Consolas, monospace; }
  .empty { background: var(--track); border-radius: 10px; padding: 18px;
           color: var(--ink-2); font-size: 0.88rem; }
</style>
</head>
<body>
<div class="wrap">
  <p><a class="back" href="/view/tables">&larr; all tables</a></p>
  <h1 id="title">Table</h1>
  <p class="sub" id="sub"><span class="live-dot"></span>live</p>
  <div id="banner"></div>
  <div class="toolbar" id="toolbar" hidden>
    <input type="search" id="q" placeholder="Search rows…" autocomplete="off">
    <button class="btn" id="clear" hidden>Clear filters</button>
    <span class="readout" id="readout"></span>
  </div>
  <div class="filters" id="filters"></div>
  <div id="content"></div>
</div>
<script>
const LIVE = __LIVE__;
const initialPayload = __DATA__;

// ---- ephemeral presentation state (never persisted; never a source of truth) ----
let sortKey = null, sortDir = 1, search = "";
const picks = {};            // column key -> Set of selected values
let payload = initialPayload;

function esc(v) {
  return String(v).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

function fmtDate(v) {
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(v);
  if (!m) return v;
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[+m[2] - 1]} ${+m[3]}, ${m[1]}`;
}

// Typed comparator: reordering delivered rows is rendering, not deriving.
function compare(a, b, column) {
  const x = a.values[column.key], y = b.values[column.key];
  const xn = x === null || x === undefined, yn = y === null || y === undefined;
  if (xn && yn) return 0;
  if (xn) return 1;                                  // unknowns sink, either direction
  if (yn) return -1;
  if (column.type === "number") return (x - y) * sortDir;
  if (column.type === "boolean") return ((x ? 1 : 0) - (y ? 1 : 0)) * sortDir;
  return String(x).localeCompare(String(y), undefined, {numeric: true}) * sortDir;
}

function matchesSearch(row, columns) {
  if (!search) return true;
  const needle = search.toLowerCase();
  return columns.some(c => {
    const v = row.values[c.key];
    return v !== null && v !== undefined && String(v).toLowerCase().includes(needle);
  });
}

function matchesFilters(row) {
  return Object.entries(picks).every(([key, chosen]) =>
    !chosen.size || chosen.has(String(row.values[key])));
}

function cell(column, row) {
  const value = row.values[column.key];
  const source = row.provenance ? row.provenance[column.key] : null;
  if (value === null || value === undefined) {
    const req = column.required ? " required" : "";
    const why = column.required ? ' title="required by this table — still unknown"' : "";
    return `<td class="unknown${req}"${why}>—</td>`;
  }
  const title = source ? ` title="source: ${esc(source)}"` : "";
  if (column.type === "boolean")
    return `<td class="sourced"${title}>${value ? "✓" : "✗"}</td>`;
  if (column.type === "number")
    return `<td class="num sourced"${title}>${esc(value.toLocaleString())}</td>`;
  if (column.type === "select")
    return `<td class="sourced"${title}><span class="chip">${esc(value)}</span></td>`;
  if (column.type === "date")
    return `<td class="sourced"${title}>${esc(fmtDate(value))}</td>`;
  if (/^https?:\/\//.test(value)) {
    const label = value.replace(/^https?:\/\/(www\.)?/, "").replace(/\/$/, "");
    return `<td class="sourced"${title}><a href="${esc(value)}" target="_blank" rel="noopener">${esc(label)}</a></td>`;
  }
  // long text: clip to one line, click the cell to expand
  return `<td class="sourced"${title} onclick="this.classList.toggle('open')">` +
         `<span class="clip">${esc(value)}</span></td>`;
}

// Filter chips: one group per select/boolean column, each value with its count.
function renderFilters(t, rows) {
  const box = document.getElementById("filters");
  const groups = t.columns.filter(c => c.type === "select" || c.type === "boolean");
  if (!groups.length) { box.innerHTML = ""; return; }
  box.innerHTML = groups.map(c => {
    const values = c.type === "boolean" ? ["true", "false"]
                                        : (c.options || []).map(String);
    const counts = {};
    rows.forEach(r => { const v = String(r.values[c.key]); counts[v] = (counts[v] || 0) + 1; });
    const chips = values.map(v => {
      const on = picks[c.key] && picks[c.key].has(v);
      const label = c.type === "boolean" ? (v === "true" ? "yes" : "no") : v;
      return `<button class="chip-btn" aria-pressed="${on ? "true" : "false"}" ` +
             `data-col="${esc(c.key)}" data-val="${esc(v)}">${esc(label)}` +
             `<span class="n">${counts[v] || 0}</span></button>`;
    }).join("");
    return `<div class="fgroup"><span class="flabel">${esc(c.label)}</span>${chips}</div>`;
  }).join("");

  box.querySelectorAll(".chip-btn").forEach(btn => btn.onclick = () => {
    const col = btn.dataset.col, val = btn.dataset.val;
    picks[col] = picks[col] || new Set();
    if (picks[col].has(val)) picks[col].delete(val); else picks[col].add(val);
    render();
  });
}

function activeFilters() {
  return Object.values(picks).some(s => s.size) || !!search;
}

function render() {
  const content = document.getElementById("content");
  const toolbar = document.getElementById("toolbar");
  if (!payload || payload.error) {
    toolbar.hidden = true;
    document.getElementById("title").textContent = "Table";
    content.innerHTML = `<div class="empty">${esc(payload ? payload.error : "no data")}` +
      (payload && payload.tables && payload.tables.length
        ? ` — try ${payload.tables.map(id => `<a href="/view/table?table_id=${esc(id)}">${esc(id)}</a>`).join(", ")}`
        : "") + `</div>`;
    return;
  }
  const t = payload.table, all = payload.rows;
  document.getElementById("title").textContent = t.name;
  document.title = t.name;
  document.getElementById("sub").innerHTML =
    `<span class="live-dot"></span>${esc(t.id)} · ${t.columns.length} columns · ` +
    `${all.length} rows · ${esc(t.description)}`;
  document.getElementById("banner").innerHTML =
    t.bottom_line ? `<div class="bottom">${esc(t.bottom_line)}</div>` : "";

  if (!all.length) {
    toolbar.hidden = true;
    document.getElementById("filters").innerHTML = "";
    content.innerHTML = '<div class="empty">No rows yet — populate is next; ' +
      'they appear here as research lands.</div>';
    return;
  }
  toolbar.hidden = false;
  renderFilters(t, all);

  let rows = all.filter(r => matchesFilters(r) && matchesSearch(r, t.columns));
  const sortCol = t.columns.find(c => c.key === sortKey);
  if (sortCol) rows = [...rows].sort((a, b) => compare(a, b, sortCol));

  document.getElementById("readout").textContent =
    rows.length === all.length ? `${all.length} rows`
                               : `${rows.length} of ${all.length} rows`;
  document.getElementById("clear").hidden = !activeFilters();

  const head = t.columns.map(c => {
    const arrow = c.key === sortKey ? `<span class="arrow">${sortDir > 0 ? "▲" : "▼"}</span>` : "";
    const missing = all.filter(r => r.values[c.key] === null || r.values[c.key] === undefined).length;
    const fill = missing ? `<span class="fill"> · ${missing} unknown</span>` : "";
    return `<th data-key="${esc(c.key)}" title="sort by ${esc(c.label)}">${esc(c.label)}${arrow}` +
           `<span class="type">${esc(c.type)}${c.required ? " · required" : ""}${fill}</span></th>`;
  }).join("");

  const body = rows.length
    ? rows.map(r => `<tr>${t.columns.map(c => cell(c, r)).join("")}</tr>`).join("")
    : `<tr><td colspan="${t.columns.length}" class="unknown">No rows match — ` +
      `clear the filters to see all ${all.length}.</td></tr>`;

  content.innerHTML = `<div class="scroller"><table><thead><tr>${head}</tr></thead>` +
                      `<tbody>${body}</tbody></table></div>` +
                      `<p class="rowmeta">Hover a cell for its source · ` +
                      `click a long cell to expand · export: ` +
                      `<code>python tools/export_csv.py ${esc(t.id)}</code></p>`;

  content.querySelectorAll("thead th").forEach(th => th.onclick = () => {
    const key = th.dataset.key;
    if (sortKey === key) sortDir = -sortDir; else { sortKey = key; sortDir = 1; }
    render();
  });
}

document.getElementById("q").addEventListener("input", e => {
  search = e.target.value.trim();
  render();
});
document.getElementById("clear").onclick = () => {
  Object.keys(picks).forEach(k => picks[k].clear());
  search = ""; document.getElementById("q").value = "";
  render();
};

render();

// Parameterized liveness: this page's identity includes its query string, so it polls
// its api with its own location.search. Control state lives outside render(), so a
// repaint preserves the user's sort, filters, and search.
if (LIVE) {
  let lastSeen = JSON.stringify(initialPayload);
  setInterval(async () => {
    try {
      const response = await fetch("/api/table" + location.search, {cache: "no-store"});
      if (!response.ok) return;
      const fresh = await response.json();
      const serialized = JSON.stringify(fresh);
      if (serialized === lastSeen) return;
      lastSeen = serialized;
      payload = fresh;
      render();
    } catch (err) { /* server briefly away — keep the last good render */ }
  }, 2000);
}
</script>
</body>
</html>
