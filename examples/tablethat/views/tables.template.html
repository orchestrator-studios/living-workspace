<!DOCTYPE html>
<!--
  tables.template.html — the catalog of tables (grown).

  One card per table record: name, description, shape, row count, and the latest
  bottom line. Each card links to the table viewer, parameterized by table id —
  /view/table?table_id=T-001. Bound to the "tables" query; polls /api/tables.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tables</title>
<style>
  :root {
    --surface: #fcfcfb; --card: #ffffff; --border: #e4e3de;
    --ink: #1c1c1a; --ink-2: #5f5e57; --track: #f0efec; --accent: #2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19; --card: #232322; --border: #383835;
      --ink: #ffffff; --ink-2: #c3c2b7; --track: #2c2c2a; --accent: #3987e5;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; background: var(--surface);
         color: var(--ink); padding: 28px 22px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.25rem; margin-bottom: 2px; }
  .sub { color: var(--ink-2); font-size: 0.84rem; margin-bottom: 22px; }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
              background: #2e9e5b; margin-right: 4px; }
  a.back { color: var(--accent); text-decoration: none; font-size: 0.84rem; }
  .item { display: block; background: var(--card); border: 1px solid var(--border);
          border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
          color: var(--ink); text-decoration: none; }
  .item:hover { border-color: var(--accent); }
  .item .name { font-weight: 600; font-size: 0.95rem; }
  .item .shape { float: right; font-family: ui-monospace, Consolas, monospace;
                 font-size: 0.72rem; color: var(--ink-2); }
  .item .desc { color: var(--ink-2); font-size: 0.84rem; margin-top: 2px; }
  .item .bottom { margin-top: 8px; padding: 8px 10px; background: var(--track);
                  border-radius: 6px; font-size: 0.84rem; }
  .empty { background: var(--track); border-radius: 10px; padding: 18px;
           color: var(--ink-2); font-size: 0.88rem; }
</style>
</head>
<body>
<div class="wrap">
  <p><a class="back" href="/">&larr; workspace</a></p>
  <h1>Tables</h1>
  <p class="sub"><span class="live-dot"></span>live — every table this workspace holds</p>
  <div id="content"></div>
</div>
<script>
const LIVE = __LIVE__;
const initialPayload = __DATA__;

function esc(value) {
  return String(value).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch]));
}

function render(payload) {
  if (!payload || !payload.length) {
    document.getElementById("content").innerHTML =
      '<div class="empty">No tables yet — commission one in conversation and it appears here.</div>';
    return;
  }
  document.getElementById("content").innerHTML = payload.map(t =>
    `<a class="item" href="/view/table?table_id=${esc(t.id)}">` +
    `<span class="shape">${esc(t.id)} · ${esc(t.columns)} cols · ${esc(t.rows)} rows</span>` +
    `<span class="name">${esc(t.name)}</span>` +
    `<div class="desc">${esc(t.description)}</div>` +
    (t.bottom_line ? `<div class="bottom">${esc(t.bottom_line)}</div>` : "") +
    `</a>`).join("");
}

render(initialPayload);

if (LIVE) {
  let lastRendered = JSON.stringify(initialPayload);
  setInterval(async () => {
    try {
      const response = await fetch("/api/tables", {cache: "no-store"});
      if (!response.ok) return;
      const freshPayload = await response.json();
      const serialized = JSON.stringify(freshPayload);
      if (serialized === lastRendered) return;
      lastRendered = serialized;
      render(freshPayload);
    } catch (err) { /* server briefly away — keep the last good render */ }
  }, 2000);
}
</script>
</body>
</html>
