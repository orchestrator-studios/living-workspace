<!DOCTYPE html>
<!--
  screening_board.template.html — the live screening board (a grown view).

  A view is a named query plus this presentation. The serving contract
  (tools/server.py) stamps two placeholders into the script below at serve time:
  the initial answer of repo.QUERIES["screening_board"](), and the live flag
  (true when served by the dashboard; a static build tool could bind the same
  template with false, leaving the polling inert). When live, the page re-asks
  the query at /api/screening_board every 2 seconds and repaints on change.

  This file owns markup and rendering only. Every number shown is computed by
  the query in tools/repo.py — never derived here (one definition of every number).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screening Board</title>
<style>
  :root {
    --surface: #fcfcfb; --card: #ffffff; --border: #e4e3de;
    --ink: #1c1c1a; --ink-2: #5f5e57; --track: #f0efec; --accent: #2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19; --card: #232322; --border: #383835;
      --ink: #ffffff; --ink-2: #c3c2b7; --track: #2c2c2a; --accent: #3987e5;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font: 14px/1.5 system-ui, sans-serif; background: var(--surface);
         color: var(--ink); padding: 28px 22px; }
  .wrap { max-width: 1080px; margin: 0 auto; }
  h1 { font-size: 1.25rem; margin-bottom: 2px; }
  .sub { color: var(--ink-2); font-size: 0.84rem; margin-bottom: 22px; }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
              background: #2e9e5b; margin-right: 4px; }
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .col { background: var(--track); border-radius: 10px; padding: 12px; }
  .col h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em;
             color: var(--ink-2); margin: 2px 4px 10px; }
  .count { float: right; background: var(--card); border: 1px solid var(--border);
            border-radius: 999px; padding: 0 8px; font-size: 0.75rem; color: var(--ink); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
           padding: 10px 12px; margin-bottom: 8px; }
  .sid { font-family: ui-monospace, Consolas, monospace; font-size: 0.7rem;
          color: var(--accent); font-weight: 700; }
  .ttl { font-size: 0.84rem; font-weight: 600; line-height: 1.35; margin: 2px 0 4px; }
  .meta { font-size: 0.72rem; color: var(--ink-2); }
  .why { font-size: 0.72rem; color: var(--ink-2); border-top: 1px solid var(--border);
          margin-top: 6px; padding-top: 5px; font-style: italic; }
  .empty { color: var(--ink-2); font-size: 0.8rem; padding: 4px; }
  @media (max-width: 760px) { .board { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Screening Board</h1>
  <p class="sub" id="sub"></p>
  <div class="board" id="board"></div>
</div>
<script>
// Both constants below are placeholders stamped in by the server at serve time
// (see "Template binding" in tools/server.py).
const LIVE = __LIVE__;              // true when served live; false in a static instance
const initialAnswer = __DATA__;     // the query's answer at the moment the page was served

// Escape a value for safe interpolation into HTML.
function esc(value) {
  return String(value).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch]));
}

// One source as a card: id, title, meta line, and — when the query supplied it —
// the deciding criterion (included) or the exclusion reason (excluded).
function cardHtml(card) {
  const why = card.detail ? `<div class="why">${esc(card.detail)}</div>` : "";
  return `<div class="card"><div class="sid">${esc(card.id)}</div>` +
         `<div class="ttl">${esc(card.title)}</div>` +
         `<div class="meta">${esc(card.meta)}</div>${why}</div>`;
}

// Repaint the whole board from one query answer: the totals line, then one
// column per screening status. No number is computed here — all come from the answer.
function render(answer) {
  // The binding contract allows a null answer (a server whose registry doesn't
  // know this query yet). Render a note; the poll repaints when the server answers.
  if (!answer) {
    document.getElementById("sub").textContent =
      "no data bound — the running server predates this view; it will recover on " +
      "the next poll, or restart tools/server.py";
    document.getElementById("board").innerHTML = "";
    return;
  }
  const totals = answer.totals;
  document.getElementById("sub").innerHTML =
    (LIVE ? '<span class="live-dot"></span>live — updates as decisions land · ' : "") +
    `${totals.sources} sources · ${totals.findings} findings extracted · ` +
    `one query, from <code>tools/repo.py</code>`;
  document.getElementById("board").innerHTML = answer.columns.map(column =>
    `<section class="col"><h2>${esc(column.status)} <span class="count">${column.count}</span></h2>` +
    (column.cards.map(cardHtml).join("\n") || '<p class="empty">none</p>') + `</section>`
  ).join("\n");
}

render(initialAnswer);

// Liveness: re-ask the query every 2 seconds and repaint only when the answer
// actually changed (compared in serialized form, so an unchanged answer costs
// nothing). Polling on purpose: the query recomputes from the record on every
// ask, so freshness is structural — see canon/anatomy.md, "Why the live page polls".
if (LIVE) {
  let lastRendered = JSON.stringify(initialAnswer);
  setInterval(async () => {
    try {
      const response = await fetch("/api/screening_board", {cache: "no-store"});
      if (!response.ok) return;
      const freshAnswer = await response.json();
      const serialized = JSON.stringify(freshAnswer);
      if (serialized === lastRendered) return;
      lastRendered = serialized;
      render(freshAnswer);
    } catch (err) { /* server briefly away — keep the last good render */ }
  }, 2000);
}
</script>
</body>
</html>
